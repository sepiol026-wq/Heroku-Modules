name: Kernel Test
on: [workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System info
        run: |
          uname -r
          sudo cat /proc/sys/kernel/kptr_restrict 2>&1 || true
          sudo cat /proc/kallsyms 2>&1 | head -5 || true
          sudo whoami
      - name: Run exploit with sudo
        run: |
          chmod +x ./full_exploit
          timeout 15 sudo ./full_exploit 2>&1 || true

